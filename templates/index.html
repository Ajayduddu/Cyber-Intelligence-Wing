<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Intelligence Wing Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; color: white; margin-bottom: 20px; }
        .header-glow { text-shadow: 0 0 10px #38bdf8; color: #38bdf8; }
        .pipeline-badge { font-size: 0.8rem; padding: 5px 10px; border-radius: 15px; background: #334155; color: #94a3b8; }
        #resultsArea { display: none; }
        pre { background: #000; padding: 15px; border-radius: 5px; color: #10b981; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="header-glow">Cyber-Intelligence Wing</h1>
            <p class="lead">3-Pipeline Threat Mapping Dashboard</p>
        </header>

        <div class="row">
            <div class="col-md-4">
                <div class="card p-4">
                    <h3>Analyze Threat</h3>
                    <div class="mb-3">
                        <label class="form-label">Attack Title</label>
                        <input type="text" id="title" class="form-control" placeholder="e.g. SSH Brute Force">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea id="desc" class="form-control" rows="4" placeholder="Log details..."></textarea>
                    </div>
                    <button onclick="runSearch()" class="btn btn-primary w-100">Run Mapping Engine</button>
                </div>
            </div>

            <div class="col-md-8">
                <div id="loading" class="text-center d-none">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">Querying ML Model & Web Search Pipelines...</p>
                </div>

                <div id="resultsArea">
                    <div class="card p-3">
                        <span class="pipeline-badge w-25">Pipeline 1 & 2: ML MAPPING</span>
                        <h4 class="mt-2">AI Prediction (SciBERT-BiLSTM)</h4>
                        <div id="mlResult"></div>
                    </div>
                    <div class="card p-3">
                        <span class="pipeline-badge w-25">Pipeline 3: WEB INTELLIGENCE</span>
                        <h4 class="mt-2">Live Web Search Verification</h4>
                        <div id="webResult"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function runSearch() {
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;
            if(!title) return alert("Please enter an attack title");

            document.getElementById('loading').classList.remove('d-none');
            document.getElementById('resultsArea').style.display = 'none';

            try {
                const response = await fetch('http://20.48.224.119:5000/api/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({title: title, description: desc})
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error);

                document.getElementById('mlResult').innerHTML = `<pre>${JSON.stringify(data.ml_results, null, 2)}</pre>`;
                document.getElementById('webResult').innerHTML = `<pre>${JSON.stringify(data.web_results, null, 2)}</pre>`;
                document.getElementById('resultsArea').style.display = 'block';

            } catch (err) {
                alert("Connection Error: Check if Port 5000 is open and Python is running.");
            } finally {
                document.getElementById('loading').classList.add('d-none');
            }
        }
    </script>
</body>
</html>
